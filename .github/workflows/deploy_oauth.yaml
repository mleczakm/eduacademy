name: Deploy OAuth Proxy to Vercel

on:
  # Pozwala na ręczne odpalenie tego zadania z zakładki "Actions" w GitHubie
  workflow_dispatch:

# Nadajemy uprawnienia do zapisu, aby bot mógł scommitować i wypchnąć plik config.yml
permissions:
  contents: write

jobs:
  deploy-oauth-server:
    runs-on: ubuntu-latest
    name: Build & Deploy Decap OAuth Proxy

    steps:
      # 1. Pobranie Twojego repozytorium, aby mieć dostęp do pliku config.yml
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Tworzy czysty katalog na nasz mikro-serwer (izolacja od kodu Astro)
      - name: Setup Proxy Directory
        run: mkdir proxy-app

      # 3. Generuje sprawdzony kod proxy OAuth (bezpośrednio)
      - name: Generate OAuth Code
        working-directory: ./proxy-app
        run: |
          mkdir -p api
          
          cat << 'EOF' > api/auth.js
          export default function handler(req, res) {
            const { host } = req.headers;
            const url = new URL('https://github.com/login/oauth/authorize');
            url.searchParams.set('client_id', process.env.OAUTH_GITHUB_CLIENT_ID);
            url.searchParams.set('redirect_uri', `https://${host}/api/callback`);
            url.searchParams.set('scope', 'repo,user');
            res.redirect(url.toString());
          }
          EOF
          
          cat << 'EOF' > api/callback.js
          export default async function handler(req, res) {
            const { code } = req.query;
          
            try {
              const response = await fetch('https://github.com/login/oauth/access_token', {
                method: 'POST',
                headers: {
                  'Accept': 'application/json',
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  client_id: process.env.OAUTH_GITHUB_CLIENT_ID,
                  client_secret: process.env.OAUTH_GITHUB_CLIENT_SECRET,
                  code,
                }),
              });
          
              const data = await response.json();
              const token = data.access_token;
          
              const script = `
                <script>
                  const receiveMessage = (message) => {
                    window.opener.postMessage(
                      'authorization:github:success:{"token":"${token}","provider":"github"}',
                      message.origin
                    );
                    window.removeEventListener('message', receiveMessage, false);
                  };
                  window.addEventListener('message', receiveMessage, false);
                  window.opener.postMessage('authorizing:github', '*');
                </script>
              `;
          
              res.setHeader('Content-Type', 'text/html');
              res.send(script);
            } catch (error) {
              res.status(500).send(error.message);
            }
          }
          EOF
          
          cat << 'EOF' > vercel.json
          {
            "version": 2,
            "rewrites": [
              { "source": "/auth", "destination": "/api/auth" },
              { "source": "/callback", "destination": "/api/callback" }
            ]
          }
          EOF
          
          cat << 'EOF' > package.json
          {
            "name": "decap-oauth-proxy",
            "version": "1.0.0",
            "type": "module"
          }
          EOF

      # 4. Instaluje oficjalne narzędzie Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # 5. Pobiera powiązanie z Twoim projektem na Vercelu
      - name: Pull Vercel Environment Information
        working-directory: ./proxy-app
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 6. Buduje wygenerowany projekt proxy
      - name: Build Project Artifacts
        working-directory: ./proxy-app
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 7. Wdraża serwer na Vercel, wyciąga URL i zapisuje do zmiennej środowiskowej
      - name: Deploy to Vercel and Capture URL
        working-directory: ./proxy-app
        run: |
          PROXY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} -e OAUTH_GITHUB_CLIENT_ID=${{ secrets.CMS_GITHUB_CLIENT_ID }} -e OAUTH_GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }})
          echo "Wygenerowany adres proxy to: $PROXY_URL"
          echo "PROXY_URL=$PROXY_URL" >> $GITHUB_ENV
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 8. Automatycznie podmienia linijkę base_url w pobranym repozytorium Astro
      - name: Inject Proxy URL into Decap Config
        run: |
          sed -i "s|base_url: .*|base_url: ${PROXY_URL}|" public/admin/config.yml

      # 9. Zapisuje zaktualizowany config.yml z powrotem na GitHuba
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/admin/config.yml
          git commit -m "chore: auto-update OAuth proxy URL [skip ci]" || echo "Brak zmian do scommitowania"
          git push
