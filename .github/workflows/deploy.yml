name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  add-dns:
    environment:
      name: github-pages
    name: Add DNS records for GitHub Pages
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - domain: "eduacademy.pl"
            ip: "185.199.108.153"
          - domain: "eduacademy.pl"
            ip: "185.199.109.153"
          - domain: "eduacademy.pl"
            ip: "185.199.110.153"
          - domain: "eduacademy.pl"
            ip: "185.199.111.153"
    steps:
      - name: "Check if ${{ matrix.domain }} already resolves to ${{ matrix.ip }}"
        id: check-dns
        run: |
          CURRENT_IP=$(dig +short ${{ matrix.domain }} A | head -n 1)
          echo "current_ip=$CURRENT_IP" >> $GITHUB_OUTPUT
          
          if [ "$CURRENT_IP" = "${{ matrix.ip }}" ]; then
            echo "DNS already correctly resolves to ${{ matrix.ip }}"
            echo "should_create=false" >> $GITHUB_OUTPUT
          else
            echo "DNS resolves to $CURRENT_IP, need to add ${{ matrix.ip }}"
            echo "should_create=true" >> $GITHUB_OUTPUT
          fi
      - name: "Create A record ${{ matrix.domain }} -> ${{ matrix.ip }}"
        if: steps.check-dns.outputs.should_create == 'true'
        uses: Bluesboy/create-dns-record@v2.1
        with:
          type: "A"
          name: "${{ matrix.domain }}"
          content: ${{ matrix.ip }}
          ttl: 1
          proxied: false
          token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}

  cleanup-dns:
    name: Cleanup unwanted DNS records
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: add-dns
    steps:
      - name: Remove unwanted A records for eduacademy.pl
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail

          DESIRED_IPS=("185.199.108.153" "185.199.109.153" "185.199.110.153" "185.199.111.153")
          DOMAINS=("eduacademy.pl")

          for domain in "${DOMAINS[@]}"; do
            echo "Fetching A records for $domain..."
            RESPONSE=$(curl -sS -X GET "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/dns_records?name=$domain&type=A&per_page=100" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json")

            success=$(echo "$RESPONSE" | jq -r '.success')
            if [ "$success" != "true" ]; then
              echo "Failed to fetch records for $domain: $RESPONSE"
              continue
            fi

            echo "$RESPONSE" | jq -c '.result[]' | while read -r record; do
              rec_id=$(echo "$record" | jq -r '.id')
              rec_ip=$(echo "$record" | jq -r '.content')

              found=false
              for desired_ip in "${DESIRED_IPS[@]}"; do
                if [ "$rec_ip" = "$desired_ip" ]; then
                  found=true
                  break
                fi
              done

              if [ "$found" = false ]; then
                echo "Deleting unwanted A record for $domain: $rec_ip (id=$rec_id)"
                del_resp=$(curl -sS -X DELETE "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/dns_records/$rec_id" \
                  -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                  -H "Content-Type: application/json")
                del_success=$(echo "$del_resp" | jq -r '.success')
                if [ "$del_success" = "true" ]; then
                  echo "✓ Deleted unwanted record $rec_id"
                else
                  echo "✗ Failed to delete record $rec_id: $del_resp"
                fi
              fi
            done
          done

          echo "✓ DNS cleanup complete"

  build:
    runs-on: ubuntu-latest
    needs: cleanup-dns
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Format code and commit if needed
        id: format
        run: |
          npm run format
          if git diff --quiet; then
            echo "No formatting changes needed"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Code was formatted, committing changes"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add .
            git commit -m "style: auto-format code"
            git push
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
      - run: npm run lint
      - run: npm run format:check
      - name: Fail if formatting changes were made
        if: steps.format.outputs.changes == 'true'
        run: |
          echo "Code was formatted and committed. Please pull the changes and try again."
          exit 1
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
